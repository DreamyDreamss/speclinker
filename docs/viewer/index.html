<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ SpecLens</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="sl-theme.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      el: '#app',
      // 문서 루트 = 프로젝트 루트. index.html은 docs/viewer/ 에 있지만
      // 문서(docs/05_설계서/...)는 프로젝트 루트 기준이므로 basePath를 위로 올린다.
      basePath: location.pathname.replace(/docs\/viewer\/(index\.html)?$/, ''),
      name: '⚡ SpecLens',
      repo: '',
      loadSidebar: false,
      loadNavbar: false,
      auto2top: true,
      noEmoji: true,
      search: {
        placeholder: 'INF ID, 경로, 화면명...',
        noData: '검색 결과 없음',
        depth: 3,
      },
    };
  </script>
  <!-- docsify-sl.js 먼저 (플러그인 등록 후 Docsify 초기화) -->
  <script src="docsify-sl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
